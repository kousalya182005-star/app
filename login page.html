<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    overflow:hidden;
}

.header{
    display:flex;
}

.header button{
    width:50%;
    padding:15px;
    border:none;
    background:#ddd;
    font-size:18px;
    cursor:pointer;
}

.header button.active{
    background:#2563eb;
    color:white;
}

.form{
    display:none;
    padding:25px;
}

.form.active{
    display:block;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button.submit{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button.submit:hover{
    background:#1d4ed8;
}

.generate{
    background:green;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
    margin-top:10px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        <button id="signupBtn" class="active">Login</button>
        <button id="signinBtn">Sign In</button>
    </div>

    <div id="signup" class="form active">
        <h2>Create Account</h2>

        <input id="signupUsername" type="text" placeholder="Username">
        <input id="signupPassword" type="password" placeholder="Password">
        <input id="signupPhone" type="text" placeholder="Phone Number">
        <button id="signupGenerateOtp" class="generate" type="button">Generate OTP</button>
        <input id="signupOtp" type="text" placeholder="Enter OTP">
        <button id="signupSubmit" class="submit" type="button">Register</button>
        <div id="signupStatus" class="status-message"></div>
    </div>

    <div id="signin" class="form">
        <h2>Sign In</h2>

        <input id="signinUsername" type="text" placeholder="Username">
        <input id="signinPassword" type="password" placeholder="Password">
        <input id="signinPhone" type="text" placeholder="Phone Number">
        <button id="signinGenerateOtp" class="generate" type="button">Generate OTP</button>
        <input id="signinOtp" type="text" placeholder="Enter OTP">
        <button id="signinSubmit" class="submit" type="button">Sign In</button>
        <div id="signinStatus" class="status-message"></div>
    </div>

    <div id="qrSection">
        <h2>Session QR Code</h2>
        <div id="qrCode">Your QR data will appear here after successful sign in.</div>
    </div>

</div>

<script>

const signup = document.getElementById('signup');
const signin = document.getElementById('signin');
const signupBtn = document.getElementById('signupBtn');
const signinBtn = document.getElementById('signinBtn');
const qrSection = document.getElementById('qrSection');
const qrCode = document.getElementById('qrCode');

signupBtn.addEventListener('click', () => {
  signup.classList.add('active');
  signin.classList.remove('active');
  signupBtn.classList.add('active');
  signinBtn.classList.remove('active');
  qrSection.style.display = 'none';
});

signinBtn.addEventListener('click', () => {
  signin.classList.add('active');
  signup.classList.remove('active');
  signinBtn.classList.add('active');
  signupBtn.classList.remove('active');
  qrSection.style.display = 'none';
});

function showStatus(elementId, message, success = true) {
  const el = document.getElementById(elementId);
  el.textContent = message;
  el.style.color = success ? '#16a34a' : '#dc2626';
}

async function requestOtp(action) {
  const username = document.getElementById(`${action}Username`).value.trim();
  const phone = document.getElementById(`${action}Phone`).value.trim();
  const statusId = `${action}Status`;

  if (!username || !phone) {
    showStatus(statusId, 'Please enter username and phone number.', false);
    return;
  }

  try {
    const response = await fetch('/generate-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, phone, action: action === 'signup' ? 'register' : 'signin' }),
    });

    const data = await response.json();
    if (!response.ok || !data.success) {
      showStatus(statusId, data.message || 'OTP request failed.', false);
      return;
    }

    showStatus(statusId, `OTP generated. Use code: ${data.otp}`);
  } catch (error) {
    showStatus(statusId, 'Unable to generate OTP. Please try again.', false);
  }
}

async function submitForm(action) {
  const username = document.getElementById(`${action}Username`).value.trim();
  const password = document.getElementById(`${action}Password`).value.trim();
  const phone = document.getElementById(`${action}Phone`).value.trim();
  const otp = document.getElementById(`${action}Otp`).value.trim();
  const statusId = `${action}Status`;
  const endpoint = action === 'signup' ? '/register' : '/signin';

  if (!username || !password || !phone || !otp) {
    showStatus(statusId, 'Please fill in all fields and OTP.', false);
    return;
  }

  try {
    const response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, phone, otp }),
    });

    const data = await response.json();
    if (!response.ok || !data.success) {
      showStatus(statusId, data.message || 'Request failed.', false);
      return;
    }

    showStatus(statusId, data.message);

    if (action === 'signin') {
      qrSection.style.display = 'block';
      qrCode.textContent = data.qrData || 'QR session data generated.';
    }
  } catch (error) {
    showStatus(statusId, 'Unable to complete request. Please try again.', false);
  }
}

document.getElementById('signupGenerateOtp').addEventListener('click', () => requestOtp('signup'));
document.getElementById('signinGenerateOtp').addEventListener('click', () => requestOtp('signin'));
document.getElementById('signupSubmit').addEventListener('click', () => submitForm('signup'));
document.getElementById('signinSubmit').addEventListener('click', () => submitForm('signin'));

</script>

</body>
</html>
